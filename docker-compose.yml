services:
  db:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_USER: "admin"
      MYSQL_PASSWORD: "123456"
      MYSQL_DATABASE: "flask-crud"
      MYSQL_ROOT_PASSWORD: "123456"
    ports:
      - "3306:3306"
    expose:
      #Opens port 3306 on the container
      - "3306"
    volumes:
      - D:\Documentos\projetos-python\sample-flask-auth\mysql:\var\lib\mysql
